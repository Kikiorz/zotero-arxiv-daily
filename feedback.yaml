# Feedback file for tracking paper interests
# This file helps the system learn your preferences over time

# Papers you found interesting (add arxiv_id, rating 1-5, and date)
interested_papers:
  # Example:
  # - arxiv_id: "2401.12345"
  #   rating: 5  # 5=extremely relevant, 4=very relevant, 3=relevant, 2=somewhat relevant, 1=slightly relevant
  #   date: "2024-01-15"
  #   reason: "Core paper for my multimodal learning research"

# Papers you're not interested in (helps filter out similar papers)
not_interested_papers:
  # Example:
  # - arxiv_id: "2401.99999"
  #   date: "2024-01-16"
  #   reason: "Too theoretical, not applicable to my work"

# Interest keywords extracted from your feedback (auto-generated or manual)
interest_keywords:
  # Example:
  # - "multimodal learning"
  # - "vision transformers"
  # - "few-shot learning"
